<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>Army Vs Zombies</title>
    <style>
      :root {
        color-scheme: light;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        background: radial-gradient(
          circle at 20% 20%,
          #f8f4e7 0%,
          #ece3cd 50%,
          #d9ccb1 100%
        );
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        overflow: hidden;
      }

      #game-root {
        border: 3px solid #4a3f35;
        border-radius: 8px;
        box-shadow: 0 16px 30px rgba(41, 33, 22, 0.25);
        overflow: hidden;
        width: min(97vw, 1760px);
        aspect-ratio: 1760 / 760;
        max-height: 94dvh;
      }

      #game-root:fullscreen,
      #game-root:-webkit-full-screen {
        width: 100vw;
        height: 100dvh;
        max-height: 100dvh;
        border: 0;
        border-radius: 0;
        box-shadow: none;
        display: grid;
        place-items: center;
        background: #16120e;
      }

      #game-root:fullscreen canvas,
      #game-root:-webkit-full-screen canvas {
        margin: auto;
      }

      @media (min-width: 1440px) {
        #game-root {
          width: min(97vw, 1780px);
        }
      }

      @media (max-width: 1024px) {
        #game-root {
          width: 100vw;
          max-height: 100dvh;
          border-width: 0;
          border-radius: 0;
          box-shadow: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="game-root"></div>

    <script src="https://cdn.jsdelivr.net/npm/phaser@3.90.0/dist/phaser.min.js"></script>
    <script type="module" src="./main.js"></script>
  </body>
</html>
